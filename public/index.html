<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spanish Street Quest</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="main-menu" class="main-menu">
      <div class="main-menu__content">
        <h1>Spanish Street Quest</h1>
        <p>Lerne Spanisch in dynamischen KI-Szenarien</p>
        <div class="main-menu__actions">
          <button id="play-button" type="button">Spielen</button>
          <button class="secondary-button" type="button">Anleitung</button>
          <button class="secondary-button" type="button">Einstellungen</button>
        </div>
      </div>
    </section>

    <section id="vocabulary-screen" class="vocabulary-screen" hidden>
      <div class="vocabulary-screen__content">
        <h1 id="vocabulary-title">Level</h1>
        <p id="vocabulary-description"></p>
        <div id="vocabulary-list" class="vocabulary-list"></div>
        <button id="start-level-button" type="button">Level starten</button>
      </div>
    </section>

    <section id="level-complete-screen" class="vocabulary-screen" hidden>
      <div class="vocabulary-screen__content">
        <h1>Level abgeschlossen</h1>
        <p id="level-summary"></p>
        <div id="learned-vocabulary-list" class="vocabulary-list"></div>
        <button id="next-level-button" type="button">Nächstes Level</button>
      </div>
    </section>

    <div id="app-shell" hidden>
      <header id="hud" class="hud">
        <div class="hud__stat">
          <span class="hud__label">Level</span>
          <span id="level-value">1</span>
        </div>
        <div class="hud__stat">
          <span class="hud__label">XP</span>
          <span id="xp-value">0/100</span>
        </div>
        <div class="hud__quest">
          <span class="hud__label">Szene</span>
          <span id="environment-title">Noch nicht geladen</span>
        </div>
        <div class="hud__quest">
          <span class="hud__label">Aktuelle Quest</span>
          <span id="quest-title">Noch nicht geladen</span>
        </div>
      </header>

      <main id="game-area" aria-label="Spanish Street Quest Spielszene">
        <section id="world" class="world">
          <div class="scrolling-background" aria-hidden="true"></div>
          <div id="scene-layer" class="scene-layer"></div>
          <div id="player" class="player" aria-label="Spielerfigur"></div>
          <div class="road"></div>
        </section>

        <div id="interaction-prompt" class="interaction-prompt" hidden>
          Drücke E zum Interagieren
        </div>
      </main>

      <footer id="inventory" class="inventory">
        <span class="inventory__label">Inventar</span>
        <ul id="inventory-list" class="inventory__list">
          <li class="inventory__empty">Leer</li>
        </ul>
        <button id="new-environment-button" class="new-quest-button" type="button" hidden>Nächstes Level</button>
        <button id="new-quest-button" class="new-quest-button" type="button" hidden>Neue KI-Quest</button>
        <button id="sidequest-button" class="sidequest-button" type="button">Mini-Challenge</button>
      </footer>
    </div>

    <div id="dialog-overlay" class="dialog-overlay" hidden>
      <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
        <div class="dialog__header">
          <h1 id="dialog-title">Dialog</h1>
          <button id="close-dialog-x" class="icon-button" type="button" aria-label="Dialog schließen">x</button>
        </div>
        <figure id="dialog-portrait-card" class="dialog__portrait-card" hidden>
          <img id="dialog-portrait" class="dialog__portrait" src="" alt="" />
          <figcaption id="dialog-portrait-caption" class="dialog__portrait-caption"></figcaption>
        </figure>
        <p id="vendor-line" class="dialog__line"></p>
        <div id="dialog-item-section" class="dialog__item-section" hidden>
          <h2 class="dialog__item-title">Gegenstand wählen</h2>
          <div id="dialog-item-options" class="dialog__item-options" aria-live="polite"></div>
        </div>
        <label class="dialog__label" for="answer-input">Deine Antwort</label>
        <input id="answer-input" type="text" placeholder="Antworte auf Spanisch..." autocomplete="off" />
        <p id="feedback-message" class="feedback" aria-live="polite"></p>
        <div id="hint-content" class="hint-content" aria-live="polite"></div>
        <div class="dialog__actions">
          <button id="submit-answer" type="button">Antwort senden</button>
          <button id="help-button" type="button">Hilfe</button>
          <button id="close-dialog" type="button">Schließen</button>
        </div>
      </section>
    </div>

    <div id="sidequest-overlay" class="sidequest-overlay" hidden>
      <section class="sidequest" role="dialog" aria-modal="true" aria-labelledby="sidequest-title">
        <div class="sidequest__header">
          <h1 id="sidequest-title">Mini-Challenge</h1>
          <button id="close-sidequest-x" class="icon-button" type="button" aria-label="Mini-Challenge schließen">x</button>
        </div>
        <p id="sidequest-question" class="sidequest__question"></p>
        <div id="sidequest-options" class="sidequest__options"></div>
        <p id="sidequest-feedback" class="feedback" aria-live="polite"></p>
        <button id="close-sidequest" type="button">Schließen</button>
      </section>
    </div>

    <script src="quests.js"></script>
    <script src="sidequests.js"></script>
    <script src="aiClient.js"></script>
    <script src="game.js"></script>
  </body>
</html>
